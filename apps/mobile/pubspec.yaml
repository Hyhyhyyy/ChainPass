name: chainpass_mobile
description: ChainPass 区块链数字身份移动端应用
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.0

  # 网络
  dio: ^5.4.0
  retrofit: ^4.0.0
  json_annotation: ^4.8.0

  # 存储
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # 路由
  go_router: ^13.0.0

  # 加密
  pointycastle: ^3.7.0
  ed25519_edwards: ^0.3.0

  # UI组件
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  qr_flutter: ^4.1.0
  shimmer: ^3.0.0
  mobile_scanner: ^4.0.0

  # 工具
  intl: ^0.18.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.0
  share_plus: ^7.2.0
  path_provider: ^2.1.0
  uni_links: ^0.5.1

  # 日志
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 代码生成
  build_runner: ^2.4.0
  retrofit_generator: ^8.0.0
  json_serializable: ^6.7.0
  hive_generator: ^2.0.0

  # Lint
  flutter_lints: ^3.0.0

  # 测试
  mockito: ^5.4.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Medium.ttf
          weight: 500
        - asset: fonts/Roboto-Bold.ttf
          weight: 700